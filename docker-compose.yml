# Local dev stack: TimescaleDB + all Python microservices against the LOCAL db.
# For the central Portainer deployment (services -> central db) see
# deploy/app.portainer.yml.

x-service: &svc
  build: .
  restart: unless-stopped
  env_file: .env
  volumes:
    - ./tools:/app/tools:ro
    - ./config:/app/config:ro
  depends_on:
    timescaledb:
      condition: service_healthy

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fin_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fin_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-fin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fin} -d ${POSTGRES_DB:-fin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Bars (stock): real-time WebSocket stream -> market_ohlcv
  bars_stock:
    <<: *svc
    container_name: fin_bars_stock
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: bars_stock
      HEARTBEAT_MAX_AGE: "150"
    command: ["python", "tools/svc_stream.py", "--market", "stock"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Bars (crypto): real-time WebSocket stream -> market_ohlcv
  bars_crypto:
    <<: *svc
    container_name: fin_bars_crypto
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: bars_crypto
      HEARTBEAT_MAX_AGE: "150"
    command: ["python", "tools/svc_stream.py", "--market", "crypto"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Signals: compute indicators -> market_signals
  signals:
    <<: *svc
    container_name: fin_signals
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: signals
      HEARTBEAT_MAX_AGE: "180"
    command: ["python", "tools/signals.py", "--interval", "60"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "180"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Calendar: market clock + trading calendar -> market_clock, market_calendar
  calendar:
    <<: *svc
    container_name: fin_calendar
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: calendar
      HEARTBEAT_MAX_AGE: "900"
    command: ["python", "tools/svc_calendar.py", "--interval", "300"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "900"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Corporate actions: dividends/splits -> corporate_actions (daily)
  corpactions:
    <<: *svc
    container_name: fin_corpactions
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: corpactions
      HEARTBEAT_MAX_AGE: "172800"
    command: ["python", "tools/svc_corpactions.py", "--interval", "86400"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "172800"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  # News: latest headlines -> news
  news:
    <<: *svc
    container_name: fin_news
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: news
      HEARTBEAT_MAX_AGE: "2700"
    command: ["python", "tools/svc_news.py", "--interval", "900"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "2700"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Dashboard: read-only monitoring UI at http://localhost:8000
  dashboard:
    <<: *svc
    container_name: fin_dashboard
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
      SERVICE_NAME: dashboard
    command: ["python", "tools/dashboard.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  timescale_data:
