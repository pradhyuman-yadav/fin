services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fin_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fin_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-fin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fin} -d ${POSTGRES_DB:-fin}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  timescale_data:
