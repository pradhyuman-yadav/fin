services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fin_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fin_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-fin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fin} -d ${POSTGRES_DB:-fin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Live 1-min bar poller. Reads ALPACA_* from .env; DATABASE_URL points at the
  # timescaledb service (overriding the localhost value in .env).
  poller:
    build: .
    container_name: fin_poller
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
    command: ["python", "tools/alpaca_live.py", "--interval", "60"]
    volumes:
      - ./tools:/app/tools:ro
      - ./config:/app/config:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  # Read-only monitoring dashboard on http://localhost:8000
  dashboard:
    build: .
    container_name: fin_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD:-fin_dev_pw}@timescaledb:5432/${POSTGRES_DB:-fin}
    command: ["python", "tools/dashboard.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - ./tools:/app/tools:ro
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale_data:
