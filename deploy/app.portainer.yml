# fin app microservices for Portainer. Deploy AFTER the timescale stack.
# Portainer -> Stacks -> Add stack -> Repository, compose path: deploy/app.portainer.yml
#
# Prereqs:
#   - fin_net network exists and the central DB (fin_timescaledb) is on it.
#   - Stack env vars set in the Portainer editor:
#       POSTGRES_PASSWORD, ALPACA_API_KEY_ID, ALPACA_API_SECRET_KEY
#     (optional: POSTGRES_USER, POSTGRES_DB, ALPACA_FEED, DASHBOARD_PORT)
#
# Images are BUILT from the repo (bind mounts don't work in Portainer git
# stacks); build context is the repo root, Dockerfile bakes tools/ + config/.

x-service: &svc
  build:
    context: ..
    dockerfile: Dockerfile
  image: fin-app:local
  restart: unless-stopped
  networks: [fin_net]

x-env: &env
  DATABASE_URL: postgresql://${POSTGRES_USER:-fin}:${POSTGRES_PASSWORD}@fin_timescaledb:5432/${POSTGRES_DB:-fin}
  ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID}
  ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY}
  ALPACA_FEED: ${ALPACA_FEED:-iex}

services:
  bars_stock:
    <<: *svc
    container_name: fin_bars_stock
    environment:
      <<: *env
      SERVICE_NAME: bars_stock
      HEARTBEAT_MAX_AGE: "150"
    command: ["python", "tools/svc_stream.py", "--market", "stock"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bars_crypto:
    <<: *svc
    container_name: fin_bars_crypto
    environment:
      <<: *env
      SERVICE_NAME: bars_crypto
      HEARTBEAT_MAX_AGE: "150"
    command: ["python", "tools/svc_stream.py", "--market", "crypto"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  signals:
    <<: *svc
    container_name: fin_signals
    environment:
      <<: *env
      SERVICE_NAME: signals
      HEARTBEAT_MAX_AGE: "180"
    command: ["python", "tools/signals.py", "--interval", "60"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "180"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  calendar:
    <<: *svc
    container_name: fin_calendar
    environment:
      <<: *env
      SERVICE_NAME: calendar
      HEARTBEAT_MAX_AGE: "900"
    command: ["python", "tools/svc_calendar.py", "--interval", "300"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "900"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

  corpactions:
    <<: *svc
    container_name: fin_corpactions
    environment:
      <<: *env
      SERVICE_NAME: corpactions
      HEARTBEAT_MAX_AGE: "172800"
    command: ["python", "tools/svc_corpactions.py", "--interval", "86400"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "172800"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  news:
    <<: *svc
    container_name: fin_news
    environment:
      <<: *env
      SERVICE_NAME: news
      HEARTBEAT_MAX_AGE: "2700"
    command: ["python", "tools/svc_news.py", "--interval", "900"]
    healthcheck:
      test: ["CMD", "python", "tools/heartbeat.py", "check", "2700"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    <<: *svc
    container_name: fin_dashboard
    environment:
      <<: *env
      SERVICE_NAME: dashboard
    command: ["python", "tools/dashboard.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  fin_net:
    external: true
