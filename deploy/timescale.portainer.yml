# TimescaleDB stack for Portainer (central, shared).
# Deploy via Portainer -> Stacks -> Add stack -> Repository (this repo),
# compose path: deploy/timescale.portainer.yml
#
# Prereqs:
#   1. Create the shared network once (Portainer -> Networks -> Add network,
#      name: fin_net, driver: bridge) OR:  docker network create fin_net
#   2. Set the env vars below in the Portainer stack editor (strong password!).
#
# n8n / poller / dashboard join the same fin_net and reach this DB at
# host "fin_timescaledb", port 5432.

services:
  timescaledb:
    # HA image (Timescale's recommended): includes Toolkit (candlestick_agg /
    # OHLC financial hyperfunctions) and timescaledb-tune auto-tuning.
    image: timescale/timescaledb-ha:pg18
    container_name: fin_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Expose the port ONLY if something outside fin_net must reach it.
    # Prefer leaving it commented and connecting over fin_net by name.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # IMPORTANT: the HA image stores data under /home/postgres/pgdata/data,
      # NOT /var/lib/postgresql/data. Mounting the wrong path = data not persisted.
      - timescale_data:/home/postgres/pgdata/data
      # The HA image ships its OWN init scripts (000_install_timescaledb,
      # 001_tune, 010_toolkit) in this dir. Do NOT mount over the whole dir --
      # that clobbers them. Mount our SQL as individual files with a prefix
      # (50_/51_/52_) so they run AFTER the image's scripts, on a fresh volume only.
      #
      # Paths are ../db/init because THIS compose file lives in deploy/ and
      # Docker resolves relative bind mounts against the compose file's folder.
      # If a source path is wrong, Docker silently creates an empty DIRECTORY at
      # the target and psql fails with "Is a directory".
      - ../db/init/01_init.sql:/docker-entrypoint-initdb.d/50_init.sql:ro
      - ../db/init/02_signals.sql:/docker-entrypoint-initdb.d/51_signals.sql:ro
      - ../db/init/03_watchlist.sql:/docker-entrypoint-initdb.d/52_watchlist.sql:ro
    networks:
      - fin_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  timescale_data:

networks:
  fin_net:
    external: true
